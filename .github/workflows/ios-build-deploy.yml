name: iOS Build & Deploy to TestFlight

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Diagnose Xcode environment
        run: |
          echo "=== macOS version ==="
          sw_vers
          echo ""
          echo "=== All Xcode installations ==="
          ls -la /Applications/ | grep -i xcode
          echo ""
          echo "=== Current xcode-select path ==="
          xcode-select -p
          echo ""
          echo "=== Current Xcode version ==="
          xcodebuild -version
          echo ""
          echo "=== Available iOS SDKs ==="
          xcodebuild -showsdks 2>/dev/null | grep -i ios || echo "No iOS SDKs found"

      - name: Select latest Xcode
        run: |
          echo "=== Finding Xcode with iOS 26 SDK ==="
          SELECTED=""
          for xc in $(ls -d /Applications/Xcode*.app 2>/dev/null | sort -rV); do
            SDK_CHECK=$("$xc/Contents/Developer/usr/bin/xcodebuild" -showsdks 2>/dev/null | grep -i 'iphoneos26' || true)
            if [ -n "$SDK_CHECK" ]; then
              SELECTED="$xc"
              echo "Found Xcode with iOS 26 SDK: $SELECTED"
              break
            fi
          done

          if [ -z "$SELECTED" ]; then
            echo "WARNING: No Xcode with iOS 26 SDK found. Using latest available."
            SELECTED=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -rV | head -1)
            echo "Falling back to: $SELECTED"
          fi

          sudo xcode-select -s "$SELECTED/Contents/Developer"
          echo ""
          echo "=== Selected Xcode ==="
          xcodebuild -version
          echo ""
          echo "=== iOS SDKs in selected Xcode ==="
          xcodebuild -showsdks | grep -i ios

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set build number
        run: |
          BUILD_NUMBER=$(( ${{ github.run_number }} + 10 ))
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo = app.expo || {};
            app.expo.ios = app.expo.ios || {};
            app.expo.ios.buildNumber = '$BUILD_NUMBER';
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
            console.log('Set ios.buildNumber =', '$BUILD_NUMBER');
          "

      - name: Expo prebuild
        run: npx expo prebuild --clean --platform ios --non-interactive
        env:
          EXPO_PUBLIC_API_URL: https://api.auditera.ostrichtech.rs

      - name: Install CocoaPods
        run: pod install --repo-update
        working-directory: ios

      - name: Install distribution certificate
        env:
          CERT_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/dist.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app.keychain
          echo "$CERT_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "keychain_password" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "keychain_password" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.PROV_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i "$PROFILE_PATH"))
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV
          echo "Installed profile UUID: $UUID"

      - name: Configure manual signing
        run: |
          PBXPROJ="ios/Auditera.xcodeproj/project.pbxproj"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' "$PBXPROJ"
          sed -i '' 's/ProvisioningStyle = Automatic/ProvisioningStyle = Manual/g' "$PBXPROJ"

          # Update ExportOptions.plist with actual profile UUID
          /usr/libexec/PlistBuddy -c "Set :provisioningProfiles:com.ostrichtech.auditera $PROFILE_UUID" \
            ios-deploy/ExportOptions.plist

      - name: Archive
        run: |
          xcodebuild archive \
            -workspace ios/Auditera.xcworkspace \
            -scheme Auditera \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Auditera.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            DEVELOPMENT_TEAM=APZ5K79LV4 \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            -allowProvisioningUpdates \
            | xcpretty || xcodebuild archive \
            -workspace ios/Auditera.xcworkspace \
            -scheme Auditera \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Auditera.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            DEVELOPMENT_TEAM=APZ5K79LV4 \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

      - name: Verify archive SDK
        run: |
          echo "=== Archive Info.plist ==="
          /usr/libexec/PlistBuddy -c "Print :ApplicationProperties:DTSDKName" \
            "$RUNNER_TEMP/Auditera.xcarchive/Info.plist" 2>/dev/null || echo "DTSDKName not found"
          /usr/libexec/PlistBuddy -c "Print :ApplicationProperties:DTXcodeBuild" \
            "$RUNNER_TEMP/Auditera.xcarchive/Info.plist" 2>/dev/null || echo "DTXcodeBuild not found"
          /usr/libexec/PlistBuddy -c "Print :ApplicationProperties:DTXcode" \
            "$RUNNER_TEMP/Auditera.xcarchive/Info.plist" 2>/dev/null || echo "DTXcode not found"
          echo ""
          echo "=== App binary SDK check ==="
          APP_PATH=$(find "$RUNNER_TEMP/Auditera.xcarchive/Products" -name "*.app" -print -quit 2>/dev/null)
          if [ -n "$APP_PATH" ]; then
            otool -l "$APP_PATH/Auditera" 2>/dev/null | grep -A2 'sdk\|minos\|LC_BUILD_VERSION' | head -20
          fi

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Auditera.xcarchive \
            -exportOptionsPlist ios-deploy/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          pip3 install codemagic-cli-tools --break-system-packages
          IPA=$(find $RUNNER_TEMP/ipa -name "*.ipa" | head -1)
          echo "Uploading: $IPA"
          echo ""
          echo "=== IPA contents ==="
          unzip -l "$IPA" | grep -E 'Info\.plist|Auditera$' | head -5
          echo ""
          app-store-connect publish \
            --path "$IPA" \
            --max-build-processing-wait 0 \
            --verbose 2>&1 || {
              echo ""
              echo "=== UPLOAD FAILED ==="
              echo "IPA path: $IPA"
              echo "IPA size: $(du -h "$IPA" | cut -f1)"
              exit 1
            }
