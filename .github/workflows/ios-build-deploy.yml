name: iOS Build & Deploy to TestFlight

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set build number
        run: |
          BUILD_NUMBER=$(( ${{ github.run_number }} + 10 ))
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo = app.expo || {};
            app.expo.ios = app.expo.ios || {};
            app.expo.ios.buildNumber = '$BUILD_NUMBER';
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
            console.log('Set ios.buildNumber =', '$BUILD_NUMBER');
          "

      - name: Expo prebuild
        run: npx expo prebuild --clean --platform ios --non-interactive
        env:
          EXPO_PUBLIC_API_URL: https://api.auditera.ostrichtech.rs

      - name: Install CocoaPods
        run: pod install --repo-update
        working-directory: ios

      - name: Install distribution certificate
        env:
          CERT_BASE64: ${{ secrets.DIST_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/dist.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app.keychain
          echo "$CERT_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "keychain_password" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "keychain_password" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.PROV_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i "$PROFILE_PATH"))
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
          echo "PROFILE_UUID=$UUID" >> $GITHUB_ENV
          echo "Installed profile UUID: $UUID"

      - name: Configure manual signing
        run: |
          PBXPROJ="ios/Auditera.xcodeproj/project.pbxproj"
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' "$PBXPROJ"
          sed -i '' 's/ProvisioningStyle = Automatic/ProvisioningStyle = Manual/g' "$PBXPROJ"

          # Update ExportOptions.plist with actual profile UUID
          /usr/libexec/PlistBuddy -c "Set :provisioningProfiles:com.ostrichtech.auditera $PROFILE_UUID" \
            ios-deploy/ExportOptions.plist

      - name: Archive
        run: |
          xcodebuild archive \
            -workspace ios/Auditera.xcworkspace \
            -scheme Auditera \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Auditera.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            DEVELOPMENT_TEAM=APZ5K79LV4 \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            -allowProvisioningUpdates \
            | xcpretty || xcodebuild archive \
            -workspace ios/Auditera.xcworkspace \
            -scheme Auditera \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Auditera.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            DEVELOPMENT_TEAM=APZ5K79LV4 \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Auditera.xcarchive \
            -exportOptionsPlist ios-deploy/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/ipa

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          pip3 install codemagic-cli-tools --break-system-packages
          IPA=$(find $RUNNER_TEMP/ipa -name "*.ipa" | head -1)
          echo "Uploading: $IPA"
          app-store-connect publish \
            --path "$IPA" \
            --max-build-processing-wait 0
