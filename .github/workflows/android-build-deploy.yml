name: Android Build & Deploy to Google Play

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/android-build-deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set version code
        run: |
          VERSION_CODE=$(( ${{ github.run_number }} + 10 ))
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          node -e "
            const fs = require('fs');
            const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            app.expo.android = app.expo.android || {};
            app.expo.android.versionCode = $VERSION_CODE;
            fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
            console.log('Set android.versionCode =', $VERSION_CODE);
          "

      - name: Expo prebuild
        run: npx expo prebuild --clean --platform android --non-interactive
        env:
          EXPO_PUBLIC_API_URL: https://api.auditera.ostrichtech.rs

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/auditera-upload.jks

      - name: Configure signing
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: node .github/scripts/configure-signing.js

      - name: Build AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: auditera-release-${{ env.VERSION_CODE }}
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 90

      - name: Check Google Play credentials
        id: play_check
        run: |
          if [ -n "$PLAY_KEY" ]; then
            echo "has_key=true" >> $GITHUB_OUTPUT
          else
            echo "has_key=false" >> $GITHUB_OUTPUT
            echo "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON not set -- skipping Play Store upload"
          fi
        env:
          PLAY_KEY: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}

      - name: Upload to Google Play
        if: steps.play_check.outputs.has_key == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.ostrichtech.auditera
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
